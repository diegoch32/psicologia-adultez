<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Línea del Tiempo: Psicología en la Adultez</title>
    <!-- Estilos de TimelineJS -->
    <link title="timeline-styles" rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background-color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        #timeline-embed {
            width: 100%;
            height: 100%;
        }
        /* Ajustes menores para mejorar legibilidad dentro de las diapositivas */
        .tl-slide-content h2 {
            font-family: 'Georgia', serif !important;
            color: #0f766e !important;
        }
        .tl-slide-content ul {
            padding-left: 20px;
            margin-bottom: 10px;
        }
        .tl-slide-content li {
            margin-bottom: 4px;
        }
        .conexion-box {
            background-color: #faf5ff;
            border-left: 3px solid #8b5cf6;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #4c1d95;
        }
    </style>
</head>
<body>

    <!-- Contenedor donde TimelineJS renderizará la línea del tiempo -->
    <div id="timeline-embed"></div>

    <!-- Script de TimelineJS -->
    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <script>
        // Estructura de datos JSON de TimelineJS
        var timeline_json = {
            "title": {
                "text": {
                    "headline": "Psicología en la Adultez: Teorías del Envejecimiento",
                    "text": "Estructura base interactiva. Contiene las teorías impares (1, 3 y 5) listas para pruebas en repositorio. Espacios preparados para la integración de las teorías pares (2, 4 y 6)."
                }
            },
            "events": [
                {
                    "start_date": {
                        "year": "1961"
                    },
                    "text": {
                        "headline": "1. Teoría de la Actividad<br><span style='font-size:0.6em; color:#64748b;'>Robert Havighurst</span>",
                        "text": "<p><strong>Postulado Central:</strong> El envejecimiento óptimo y la satisfacción vital están directamente ligados a mantener un estilo de vida activo y la retención de roles sociales de la adultez media.</p><ul><li><strong>Sustitución de Roles:</strong> Ante la pérdida de roles (jubilación), se deben buscar sustitutos para mantener el bienestar.</li><li><strong>Autoestima:</strong> Depende de la utilidad social percibida a través de la acción.</li><li><strong>Tareas del Desarrollo:</strong> Demandas específicas que requieren esfuerzo activo.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Actúa como el pilar del paradigma pragmático. Nace en confrontación directa con la <em>Teoría de la Desvinculación (Teoría 2)</em>, argumentando que el aislamiento es impuesto por la sociedad y no un deseo natural del adulto.</div>"
                    }
                },
                {
                    /* =======================================================================
                       ESPACIO RESERVADO PARA TU PAREJA (TEORÍA 2)
                       AUTORES: ELAINE CUMMING Y WILLIAM E. HENRY (TEORÍA DE LA DESVINCULACIÓN)
                       AÑO ESTIMADO: 1961
                       ======================================================================= */
                    "start_date": {
                        "year": "1961",
                        "display_date": "1961 (Aprox.)"
                    },
                    "text": {
                        "headline": "<span style='color:#cbd5e1;'>2. Espacio para Teoría de la Desvinculación</span>",
                        "text": "<p style='color:#94a3b8;'>[Tu pareja debe insertar aquí las aportaciones de Elaine Cumming y William E. Henry y su contraste con la Teoría de la Actividad de Havighurst]</p>"
                    }
                },
                {
                    "start_date": {
                        "year": "1971"
                    },
                    "text": {
                        "headline": "3. Teoría de la Continuidad<br><span style='font-size:0.6em; color:#64748b;'>Robert Atchley</span>",
                        "text": "<p><strong>Postulado Central:</strong> Los adultos intentan preservar una estructura de consistencia interna (identidad, rasgos) y externa (roles, entornos), usando estrategias basadas en su experiencia previa.</p><ul><li><strong>Estructura Dual:</strong> Diferencia la adaptación mental de la social.</li><li><strong>Recurso Heurístico:</strong> El pasado dota al adulto de herramientas para resolver problemas del presente.</li><li><strong>Visión No Rupturista:</strong> La vejez es una prolongación coherente de la biografía previa.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Es la <em>síntesis dialéctica</em> del debate. Surge para resolver la polarización extrema entre la Actividad (Teoría 1) y la Desvinculación (Teoría 2). Postula que el éxito es la coherencia biográfica: ni el aislamiento ni la actividad son recetas universales.</div>"
                    }
                },
                {
                    /* =======================================================================
                       ESPACIO RESERVADO PARA TU PAREJA (TEORÍA 4)
                       AUTORES: LAURA CARSTENSEN (TEORÍA DE LA SELECTIVIDAD SOCIOEMOCIONAL)
                       AÑO ESTIMADO: 1992
                       ======================================================================= */
                    "start_date": {
                        "year": "1992",
                        "display_date": "1992 (Aprox.)"
                    },
                    "text": {
                        "headline": "<span style='color:#cbd5e1;'>4. Espacio para Teoría de la Selectividad Socioemocional</span>",
                        "text": "<p style='color:#94a3b8;'>[Tu pareja debe insertar aquí las aportaciones de Laura Carstensen y cómo conecta con la continuidad biográfica]</p>"
                    }
                },
                {
                    "start_date": {
                        "year": "1987"
                    },
                    "text": {
                        "headline": "5. Teoría del Envejecimiento Exitoso<br><span style='font-size:0.6em; color:#64748b;'>John Rowe y Robert Kahn</span>",
                        "text": "<p><strong>Postulado Central:</strong> El envejecimiento no es sinónimo de patología inevitable. Existe una distinción clara entre envejecimiento habitual y exitoso (optimización biológica, psicológica y social).</p><ul><li><strong>Modelo Tríadico:</strong> 1) Baja probabilidad de enfermedad, 2) Alta capacidad funcional física/cognitiva, 3) Compromiso activo con la vida.</li><li><strong>Despatologización:</strong> Desafía la visión tradicional médica del déficit.</li><li><strong>Productividad No Económica:</strong> Valida el voluntariado y apoyo familiar como salud.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Se sitúa cronológicamente tras la Selectividad Socioemocional (Teoría 4). Mientras Carstensen aborda la motivación del tiempo, Rowe y Kahn aportan la infraestructura biológica y pragmática: mantener la reserva física y cognitiva para poder elegir activamente.</div>"
                    }
                },
                {
                    /* =======================================================================
                       ESPACIO RESERVADO PARA TU PAREJA (TEORÍA 6)
                       AUTORES: LARS TORNSTAM (TEORÍA DE LA GEROTRASCENDENCIA)
                       AÑO ESTIMADO: 1989 / 1994
                       ======================================================================= */
                    "start_date": {
                        "year": "1989",
                        "display_date": "1989/1994"
                    },
                    "text": {
                        "headline": "<span style='color:#cbd5e1;'>6. Espacio para Teoría de la Gerotrascendencia</span>",
                        "text": "<p style='color:#94a3b8;'>[Tu pareja debe insertar aquí las aportaciones de Lars Tornstam como cierre del ciclo vital]</p>"
                    }
                }
            ]
        };

        // Inicialización de TimelineJS
        window.timeline = new TL.Timeline('timeline-embed', timeline_json, {
            language: 'es',
            start_at_slide: 0,
            initial_zoom: 2
        });
    </script>
</body>
</html>
