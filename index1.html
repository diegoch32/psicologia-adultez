<head>
    <meta charset="UTF-8">

    <title>Línea del Tiempo: Psicología en la Adultez</title>
    <!-- Estilos de TimelineJS -->
    <link title="timeline-styles" rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background-color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        #timeline-embed {
            width: 100%;
            height: 100%;
        }
        .tl-slide-content h2 {
            font-family: 'Georgia', serif !important;
            color: #0f766e !important;
        }
        .tl-slide-content ul {
            padding-left: 20px;
            margin-bottom: 10px;
        }
        .tl-slide-content li {
            margin-bottom: 4px;
        }
        .conexion-box {
            background-color: #faf5ff;
            border-left: 3px solid #8b5cf6;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #4c1d95;
        }
    </style>
</head>
<body>

    <div id="timeline-embed"></div>

    <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

    <script>
        var timeline_json = {
            "title": {
                "text": {
                    "headline": "Psicología en la Adultez: Teorías del Envejecimiento",
                    "text": "Línea del tiempo completa e integrada con las 6 teorías del desarrollo y envejecimiento, ordenadas cronológicamente para una correcta navegación interactiva."
                }
            },
            "events": [
                {
                    "start_date": {
                        "year": "1961"
                    },
                    "text": {
                        "headline": "1. Teoría de la Actividad<br><span style='font-size:0.6em; color:#64748b;'>Robert Havighurst</span>",
                        "text": "<p><strong>Postulado Central:</strong> El envejecimiento óptimo y la satisfacción vital están directamente ligados a mantener un estilo de vida activo y la retención de roles sociales de la adultez media.</p><ul><li><strong>Sustitución de Roles:</strong> Ante la pérdida de roles (jubilación), se deben buscar sustitutos para mantener el bienestar.</li><li><strong>Autoestima:</strong> Depende de la utilidad social percibida a través de la acción.</li><li><strong>Tareas del Desarrollo:</strong> Demandas específicas que requieren esfuerzo activo.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Actúa como el pilar del paradigma pragmático. Nace en confrontación directa con la <em>Teoría de la Desvinculación (Teoría 2)</em>, argumentando que el aislamiento es impuesto por la sociedad y no un deseo natural del adulto.</div>"
                    }
                },
                {
                    "start_date": {
                        "year": "1961"
                    },
                    "text": {
                        "headline": "2. Teoría de la Desvinculación<br><span style='font-size:0.6em; color:#64748b;'>Elaine Cummings y William Earle Henry</span>",
                        "text": "<p><em>O teoría del desapego.</em></p><p><strong>Postulado Central:</strong> El envejecimiento exitoso implica un distanciamiento recíproco e inevitable entre el individuo que envejece y la sociedad. Es un proceso universal, normal y funcional.</p><p><strong>Mecanismo Doble:</strong></p><ul><li><strong>El individuo:</strong> Reduce su interés por el entorno, se centra en su mundo interno y abandona roles sociales (jubilación, menos participación comunitaria).</li><li><strong>La sociedad:</strong> Desplaza al adulto mayor para dar paso a las generaciones jóvenes, garantizando el equilibrio y la continuidad del sistema antes de la muerte del individuo.</li></ul>"
                    }
                },
                {
                    "start_date": {
                        "year": "1971"
                    },
                    "text": {
                        "headline": "3. Teoría de la Continuidad<br><span style='font-size:0.6em; color:#64748b;'>Robert Atchley</span>",
                        "text": "<p><strong>Postulado Central:</strong> Los adultos intentan preservar una estructura de consistencia interna (identidad, rasgos) and externa (roles, entornos), usando estrategias basadas en su experiencia previa.</p><ul><li><strong>Estructura Dual:</strong> Diferencia la adaptación mental de la social.</li><li><strong>Recurso Heurístico:</strong> El pasado dota al adulto de herramientas para resolver problemas del presente.</li><li><strong>Visión No Rupturista:</strong> La vejez es una prolongación coherente de la biografía previa.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Es la <em>síntesis dialéctica</em> del debate. Surge para resolver la polarización extrema entre la Actividad (Teoría 1) y la Desvinculación (Teoría 2). Postula que el éxito es la coherencia biográfica: ni el aislamiento ni la actividad son recetas universales.</div>"
                    }
                },
                {
                    "start_date": {
                        "year": "1987"
                    },
                    "text": {
                        "headline": "5. Teoría del Envejecimiento Exitoso<br><span style='font-size:0.6em; color:#64748b;'>John Rowe y Robert Kahn</span>",
                        "text": "<p><strong>Postulado Central:</strong> El envejecimiento no es sinónimo de patología inevitable. Existe una distinción clara entre envejecimiento habitual y exitoso (optimización biológica, psicológica y social).</p><ul><li><strong>Modelo Tríadico:</strong> 1) Baja probabilidad de enfermedad, 2) Alta capacidad funcional física/cognitiva, 3) Compromiso activo con la vida.</li><li><strong>Despatologización:</strong> Desafía la visión tradicional médica del déficit.</li><li><strong>Productividad No Económica:</strong> Valida el voluntariado y apoyo familiar como salud.</li></ul><div class='conexion-box'><strong>Conexión con el flujo:</strong> Se sitúa cronológicamente tras la Selectividad Socioemocional (Teoría 4). Mientras Carstensen aborda la motivación del tiempo, Rowe y Kahn aportan la infraestructura biológica y pragmática: mantener la reserva física y cognitiva para poder elegir activamente.</div>"
                    }
                },
                {
                    "start_date": {
                        "year": "1989",
                        "display_date": "1989–1994"
                    },
                    "text": {
                        "headline": "6. Teoría de la Gerotrascendencia<br><span style='font-size:0.6em; color:#64748b;'>Lars Tornstam</span>",
                        "text": "<p><strong>Postulado Central:</strong> El envejecimiento normal incluye un cambio natural y madurativo desde una visión del mundo materialista y pragmática hacia una perspectiva cósmica, trascendente y espiritual.</p><p><strong>Tres Dimensiones del Cambio:</strong></p><ul><li><strong>El Yo:</strong> Disminución del egocentrismo, menor preocupación por el cuerpo/apariencia y redescubrimiento del niño interior.</li><li><strong>Las Relaciones:</strong> Mayor necesidad de soledad positiva (solitude), abandono de roles superficiales y selectividad extrema en los vínculos.</li><li><strong>Dimensión Cósmica:</strong> Nueva percepción del tiempo y el espacio, aceptación de la muerte con paz y mayor conexión con la naturaleza y las generaciones pasadas.</li></ul><p><em>Define la vejez no como un declive, sino como una fase evolutiva final de iluminación y sabiduría que redefine la realidad del individuo.</em></p>"
                    }
                },
                {
                    "start_date": {
                        "year": "1992",
                        "display_date": "1992–1999"
                    },
                    "text": {
                        "headline": "4. Teoría de la Selectividad Socioemocional (TSS)<br><span style='font-size:0.6em; color:#64748b;'>Laura Carstensen</span>",
                        "text": "<p><strong>Premisa:</strong> El motor del cambio en el desarrollo no es la edad, sino el horizonte temporal (la percepción del tiempo que nos que por vivir).</p><p><strong>Transición de Metas:</strong></p><ul><li><strong>Futuro expansivo (Juventud):</strong> Prioridad en metas de información, exploración y ampliación de redes sociales (networking).</li><li><strong>Futuro limitado (Vejez):</strong> Prioridad en metas de regulación emocional, optimización del bienestar presente y significado.</li></ul><p><strong>Hito Conductual:</strong> Poda social deliberada (reducción selectiva de la red social hacia vínculos íntimos y significativos) y Efecto de Positividad (sesgo cognitivo hacia estímulos y recuerdos positivos).</p>"
                    }
                }
            ]
        };

        window.timeline = new TL.Timeline('timeline-embed', timeline_json, {
            language: 'es',
            start_at_slide: 0,
            initial_zoom: 2
        });
    </script>
</body>
</html>
